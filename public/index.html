<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>ModVerse</title>
<meta name="theme-color" content="#0b0e14" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="boot-screen">
    <h1>ModVerse</h1>
    <div id="boot-progress"><div id="boot-bar"></div></div>
    <p id="boot-status">Booting engine…</p>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="hud" class="hidden">
    <div id="hotbar"></div>
    <div id="vitals">
      <div class="bar"><div id="health-bar" class="fill health"></div></div>
      <div class="bar"><div id="stamina-bar" class="fill stamina"></div></div>
    </div>
    <div id="clock">00:00</div>
    <button id="btn-inventory" class="hud-btn">🎒</button>
    <button id="btn-console" class="hud-btn">⌘</button>
  </div>

  <div id="inventory-panel" class="panel hidden">
    <h2>Inventory</h2>
    <div id="inventory-grid" class="grid"></div>
    <h2>Crafting</h2>
    <div id="crafting-list"></div>
    <button class="close-btn" data-close="inventory-panel">Close</button>
  </div>

  <div id="console-panel" class="panel hidden">
    <div id="console-log"></div>
    <input id="console-input" type="text" placeholder="type a command… (help)" autocomplete="off" />
  </div>

  <!-- touch controls for Android -->
  <div id="touch-controls" class="hidden">
    <div id="joystick"><div id="joystick-knob"></div></div>
    <button id="btn-jump" class="touch-btn">Jump</button>
    <button id="btn-interact" class="touch-btn">Use</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
